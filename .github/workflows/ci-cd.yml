# ──────────────────────────────────────────────────────────────────────────────
# Simplified CI/CD Pipeline - Build & Publish Only
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Build Package (sdist + wheel)
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Publish to GitHub Packages (on tags only)
  # ────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install twine
        run: pip install --upgrade twine

      - name: Publish to GitHub Packages
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PACKAGES_TOKEN }}
          TWINE_REPOSITORY_URL: https://pypi.pkg.github.com/Infinitemind-im/
        run: twine upload dist/*
